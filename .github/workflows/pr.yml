name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --enable errcheck,govet,staticcheck

      - name: Run tests
        run: go test ./...

      - name: Build
        run: CGO_ENABLED=1 go build ./cmd/bot
